<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生成绩查询系统</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #e8eaf6 0%, #f3e5f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.10);
            display: flex;
            flex-direction: column;
            height: 94vh;
            max-height: 900px;
        }

        .header {
            padding: 20px 28px 16px;
            border-bottom: 1px solid #f0f0f0;
            flex-shrink: 0;
        }
        .header-top {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-top h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }
        .header-top .icon { font-size: 26px; }
        .header-top .badge {
            margin-left: auto;
            font-size: 11px;
            background: #ede7f6;
            color: #5e35b1;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .samples {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .samples .chip {
            padding: 5px 14px;
            background: #f5f3ff;
            color: #5e35b1;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #e8e0ff;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .samples .chip:hover { background: #e8e0ff; }
        .samples .chip:active { transform: scale(0.95); }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .messages::-webkit-scrollbar { width: 5px; }
        .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

        .msg {
            display: flex;
            gap: 12px;
            max-width: 88%;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.bot { align-self: flex-start; }

        .msg .avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .msg.user .avatar { background: #7c4dff; }
        .msg.bot .avatar { background: #f0f0f0; }

        .msg .bubble {
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .msg.user .bubble {
            background: #7c4dff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .msg.bot .bubble {
            background: #f5f5f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        /* 缓存区格式化 */
        .msg.bot .bubble pre {
            background: #e8e8e8;
            border-radius: 8px;
            padding: 10px 14px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }
        .msg.bot .bubble code {
            background: #e8e8e8;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 13px;
        }
        .msg.bot .bubble table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
            font-size: 13px;
        }
        .msg.bot .bubble table th,
        .msg.bot .bubble table td {
            border: 1px solid #ddd;
            padding: 6px 10px;
            text-align: left;
        }
        .msg.bot .bubble table th {
            background: #e8e0ff;
            font-weight: 600;
        }
        .msg.bot .bubble ul, .msg.bot .bubble ol {
            padding-left: 20px;
            margin: 6px 0;
        }

        /* 打字指示器 */
        .typing {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }
        .typing span {
            width: 7px; height: 7px;
            background: #aaa;
            border-radius: 50%;
            animation: typing 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
        }

        .input-area {
            padding: 16px 28px 20px;
            border-top: 1px solid #f0f0f0;
            flex-shrink: 0;
        }
        .input-row { display: flex; gap: 10px; }
        .input-row input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: #7c4dff; }
        .input-row button {
            padding: 12px 24px;
            background: #7c4dff;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .input-row button:hover { background: #651fff; }
        .input-row button:disabled { background: #b39ddb; cursor: not-allowed; }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #ccc;
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .container { height: 100vh; max-height: none; border-radius: 0; }
            .header { padding: 14px 16px 12px; }
            .messages { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .msg { max-width: 95%; }
        }
    </style>
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-top">
            <span class="icon">🎓</span>
            <h1>学生成绩查询</h1>
            <span class="badge">AI 驱动</span>
        </div>
        <div class="samples">
            <button class="chip" onclick="sendQuery('查一下张明的成绩')">📖 张明的成绩</button>
            <button class="chip" onclick="sendQuery('查询学号 2023414320301 的成绩')">🔢 2023414320301</button>
            <button class="chip" onclick="sendQuery('谁的成绩最好')">🏆 谁的成绩最好</button>
            <button class="chip" onclick="sendQuery('有哪些不及格的同学')">⚠️ 不及格同学</button>
            <button class="chip" onclick="sendQuery('计算机专业所有学生的GPA')">📊 专业 GPA</button>
        </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="input" placeholder="输入你的问题..." autofocus>
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
        <div class="footer-note">由 Dify AI 工作流驱动 · 数据通过 AI 查询</div>
    </div>

</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

let conversationId = '';
let isWaiting = false;

inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function sendQuery(text) {
    inputEl.value = text;
    sendMessage();
}

// ===== 发送消息（流式） =====
async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isWaiting) return;

    inputEl.value = '';
    appendMessage('user', text);
    isWaiting = true;
    sendBtn.disabled = true;

    // 打字占位气泡
    const msgEl = document.createElement('div');
    msgEl.className = 'msg bot';
    msgEl.id = 'bot-response';
    msgEl.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    messagesEl.appendChild(msgEl);
    scrollBottom();

    const bubble = msgEl.querySelector('.bubble');

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: text, conversation_id: conversationId }),
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
            throw new Error(err.error || `HTTP ${res.status}`);
        }

        // ---- 读取 SSE 流 ----
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let fullAnswer = '';
        let streamDone = false;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop() || '';

            for (const line of lines) {
                const t = line.trim();
                if (!t.startsWith('data: ')) continue;
                try {
                    const evt = JSON.parse(t.slice(6));
                    const et = evt.event;

                    if (et === 'message') {
                        // Dify 的 answer 是累积的完整文本
                        if (evt.answer) {
                            fullAnswer = evt.answer;
                            // 流式显示纯文本（不渲染 markdown，避免闪烁）
                            bubble.className = 'bubble';
                            bubble.textContent = fullAnswer;
                            scrollBottom();
                        }
                    } else if (et === 'message_end') {
                        if (evt.conversation_id) conversationId = evt.conversation_id;
                        streamDone = true;
                    } else if (et === 'error') {
                        bubble.textContent = `😅 ${evt.message || 'AI 错误'}`;
                        streamDone = true;
                    }
                } catch (e) {}
            }
        }

        // ---- 流结束，进行完整渲染 ----
        bubble.className = 'bubble';
        bubble.innerHTML = '';
        if (fullAnswer) {
            renderAnswer(bubble, fullAnswer);
        } else {
            bubble.textContent = '(AI 未返回有效回答)';
        }
        scrollBottom();

    } catch (err) {
        bubble.className = 'bubble';
        bubble.textContent = `😅 ${err.message}`;
    } finally {
        isWaiting = false;
        sendBtn.disabled = false;
        inputEl.focus();
        scrollBottom();
    }
}

// ===== 渲染回答：文本 + 图表混合 =====
function renderAnswer(container, text) {
    let parts;
    if (text.includes('```')) {
        parts = text.split(/(```echarts[\s\S]*?```)/g);
    } else {
        parts = [text];
    }

    for (const part of parts) {
        let jsonStr = null;
        const m = part.match(/```echarts\n?([\s\S]*?)```/);
        if (m) {
            jsonStr = m[1].trim();
        } else if (!text.includes('```')) {
            try {
                const obj = JSON.parse(part.trim());
                if (obj && obj.series) jsonStr = part.trim();
            } catch (e) {}
        }

        if (jsonStr) {
            renderEChart(container, jsonStr);
        } else if (part.trim()) {
            const d = document.createElement('div');
            d.innerHTML = renderMarkdown(part);
            container.appendChild(d);
        }
    }
}

// ===== 渲染 ECharts 图表 =====
let chartIdCounter = 0;

function renderEChart(container, jsonStr) {
    try {
        const option = JSON.parse(jsonStr);

        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'width:100%;margin:12px 0;';

        const chartDiv = document.createElement('div');
        chartDiv.style.cssText = 'width:100%;height:320px;';
        chartDiv.id = 'echart-' + (++chartIdCounter);
        wrapper.appendChild(chartDiv);
        container.appendChild(wrapper);

        // 让包含图表的元素不受宽度限制
        const bubble = container.closest('.bubble');
        if (bubble) {
            bubble.style.maxWidth = '100%';
            const msg = bubble.closest('.msg');
            if (msg) msg.style.maxWidth = '100%';
        }

        // 用三重保证确保图表获得正确宽度:
        // 1) requestAnimationFrame → 2) 短延时 → 3) ResizeObserver
        function initChart(dom) {
            if (!dom || dom._chartInited) return;
            if (dom.offsetWidth === 0) return false; // 还没布局
            dom._chartInited = true;
            const chart = echarts.init(dom);
            chart.setOption(option);
            chart.resize();
            new ResizeObserver(() => chart.resize()).observe(dom);
            scrollBottom();
            return true;
        }

        requestAnimationFrame(() => {
            const dom = document.getElementById(chartDiv.id);
            if (!dom) return;
            if (!initChart(dom)) {
                // 第一次宽度为 0，等 300ms 重试
                setTimeout(() => initChart(dom), 300);
            }
        });
    } catch (e) {
        const d = document.createElement('div');
        d.textContent = jsonStr;
        container.appendChild(d);
    }
}

// ===== 简易 Markdown 渲染 =====
function renderMarkdown(text) {
    let html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // 代码块（非 echarts 的普通代码块）
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${code.trim()}</code></pre>`;
    });

    // 行内代码
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // 表格
    html = html.replace(/(^\|.+\|\n)(^\|[-:| ]+\|\n)((?:\|.+\|\n?)*)/gm, (match) => {
        const rows = match.trim().split('\n');
        const headers = rows[0].split('|').filter(c => c.trim());
        const body = rows.slice(2);
        let table = '<table><thead><tr>';
        headers.forEach(h => { table += `<th>${h.trim()}</th>`; });
        table += '</tr></thead><tbody>';
        body.forEach(row => {
            const cells = row.split('|').filter(c => c.trim());
            if (cells.length) {
                table += '<tr>';
                cells.forEach(c => { table += `<td>${c.trim()}</td>`; });
                table += '</tr>';
            }
        });
        table += '</tbody></table>';
        return table;
    });

    // 加粗
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // 无序列表
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

    // 有序列表
    html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

    // echarts 块（已经被外层 renderAnswer 处理了，但兜底保留）
    html = html.replace(/```echarts[\s\S]*?```/g, '📊 [图表]');

    // 换行
    html = html.replace(/\n/g, '<br>');
    html = html.replace(/<li>(.*?)<br>/g, '<li>$1');

    return html;
}

function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
        <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="bubble">${escapeHtml(text)}</div>
    `;
    messagesEl.appendChild(div);
    scrollBottom();
}

function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}
</script>

</body>
</html>
